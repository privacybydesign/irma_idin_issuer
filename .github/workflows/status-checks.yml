# Workflow to check whether changes to master fulfill all requirements.
name: Status checks

on:
  push:
    branches: [ master ]
  pull_request:
  schedule:
    # Run every monday on 9:00 in the morning (UTC).
    - cron: "0 9 * * 1"
  # Make it possible to trigger the checks manually.
  workflow_dispatch:

jobs:
    unit-tests:
      name: Gradle tests
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: '21'
            cache: gradle

        # The Dockerfile's javabuild stage already runs the JUnit suite as part
        # of the build-docker job, so tests are gated either way. This dedicated
        # job runs them decoupled from the image build for faster feedback,
        # test reporting, and Gradle dependency caching.
        - name: Run unit tests
          run: ./gradlew --no-daemon clean test

    build-docker:
      runs-on: ubuntu-latest

      steps:
        # Step 1: Checkout repository
        - name: Checkout code
          uses: actions/checkout@v4

        # Step 2: Build the Docker image for Java/Gradle (stop at javabuild step)
        - name: Build Docker image
          run: docker build -t idin-issuer .

        - name: Use Node.js
          uses: actions/setup-node@v3
          with:
            node-version: '20'

        - name: Install dependencies
          working-directory: frontend
          run: npm install

        - name: Build project
          working-directory: frontend
          run: npm run build
